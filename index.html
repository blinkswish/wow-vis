<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>wow-vis — Raid Mistake Visualiser</title>
    <style>
      body { margin: 0; background: #0d0b1a; color: #e8e6f0;
             font-family: monospace; display: flex; flex-direction: column;
             align-items: center; gap: 12px; padding: 16px; }
      canvas { image-rendering: pixelated; width: 960px; max-width: 100%;
               border: 2px solid #3a3360; }
      .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
      .chk { display: flex; gap: 4px; align-items: center; cursor: pointer; }
      button, select { font-family: monospace; padding: 6px 10px;
               background: #241f3d; color: #e8e6f0; border: 1px solid #4a4270; }
    </style>
  </head>
  <body>
    <div class="controls">
      <select id="boss"></select>
      <select id="mechanic"></select>
      <button id="metric">Count</button>
      <label class="chk"><input type="checkbox" id="omit-tanks" /> No tanks</label>
      <button id="play">▶ Play</button>
      <button id="export">⬇ Export MP4</button>
      <span id="status"></span>
    </div>
    <canvas id="view"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
